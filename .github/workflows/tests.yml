name: Tests & Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            xdotool

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Run Rust tests
        run: cargo test -p voxforge --lib --verbose --manifest-path src-tauri/Cargo.toml

      - name: Run Rust doc tests
        run: cargo test -p voxforge --doc --manifest-path src-tauri/Cargo.toml

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libsoup-3.0-dev \
            libwebkit2gtk-4.1-dev \
            xdotool

      - name: Check Rust formatting
        run: cargo fmt -p voxforge --manifest-path src-tauri/Cargo.toml -- --check

      - name: Run Rust clippy
        run: cargo clippy -p voxforge --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Install npm dependencies
        run: npm install

      - name: Check TypeScript formatting
        run: npm run format -- --check

      - name: Run ESLint
        run: npm run lint

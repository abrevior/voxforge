<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>VoxForge — Redesign</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; font-family: system-ui, -apple-system, "Cantarell", "Segoe UI", sans-serif; }
  #root { width: 100%; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="main-window.jsx"></script>
<script type="text/babel" src="overlay.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "micStyle": "minimal",
  "statusbar": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const theme = t.theme;
  const isDark = theme === 'dark';

  // Backdrop for overlay artboards
  const overlayBg = isDark
    ? 'linear-gradient(135deg, #1a2030 0%, #0f1419 100%)'
    : 'linear-gradient(135deg, #e8edf4 0%, #f5f7fa 100%)';

  return (
    <>
      <DesignCanvas>
        <DCSection id="main" title="Main window" subtitle="Three tabs · dark + light · refined GTK chrome">
          <DCArtboard id="record-dark" label="Record · Dark" width={780} height={620}>
            <MainWindow theme="dark" tab="record" micStyle={t.micStyle} statusbar={t.statusbar}/>
          </DCArtboard>
          <DCArtboard id="record-light" label="Record · Light" width={780} height={620}>
            <MainWindow theme="light" tab="record" micStyle={t.micStyle} statusbar={t.statusbar}/>
          </DCArtboard>
          <DCArtboard id="history-dark" label="History · Dark" width={780} height={620}>
            <MainWindow theme="dark" tab="history" micStyle={t.micStyle} statusbar={t.statusbar}/>
          </DCArtboard>
          <DCArtboard id="history-light" label="History · Light" width={780} height={620}>
            <MainWindow theme="light" tab="history" micStyle={t.micStyle} statusbar={t.statusbar}/>
          </DCArtboard>
          <DCArtboard id="settings-dark" label="Settings · Dark" width={780} height={620}>
            <MainWindow theme="dark" tab="settings" micStyle={t.micStyle} statusbar={t.statusbar}/>
          </DCArtboard>
          <DCArtboard id="settings-light" label="Settings · Light" width={780} height={620}>
            <MainWindow theme="light" tab="settings" micStyle={t.micStyle} statusbar={t.statusbar}/>
          </DCArtboard>
        </DCSection>

        <DCSection id="overlay" title="Overlay states" subtitle="Floating pill — recording, transcribing, done">
          <DCArtboard id="ov-rec-dark" label="Recording · Dark" width={360} height={140}>
            <OverlayStage theme="dark"><Overlay state="recording" theme="dark" duration="0:14"/></OverlayStage>
          </DCArtboard>
          <DCArtboard id="ov-trans-dark" label="Transcribing · Dark" width={360} height={140}>
            <OverlayStage theme="dark"><Overlay state="transcribing" theme="dark" duration="0:14"/></OverlayStage>
          </DCArtboard>
          <DCArtboard id="ov-done-dark" label="Done · Dark" width={420} height={140}>
            <OverlayStage theme="dark"><Overlay state="done" theme="dark" text="Add a useEffect hook to fetch user data…"/></OverlayStage>
          </DCArtboard>
          <DCArtboard id="ov-rec-light" label="Recording · Light" width={360} height={140}>
            <OverlayStage theme="light"><Overlay state="recording" theme="light" duration="0:14"/></OverlayStage>
          </DCArtboard>
          <DCArtboard id="ov-trans-light" label="Transcribing · Light" width={360} height={140}>
            <OverlayStage theme="light"><Overlay state="transcribing" theme="light" duration="0:14"/></OverlayStage>
          </DCArtboard>
          <DCArtboard id="ov-done-light" label="Done · Light" width={420} height={140}>
            <OverlayStage theme="light"><Overlay state="done" theme="light" text="Add a useEffect hook to fetch user data…"/></OverlayStage>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakRadio
            value={t.theme}
            onChange={v => setTweak('theme', v)}
            options={[{value:'dark', label:'Dark'},{value:'light', label:'Light'}]}
          />
        </TweakSection>
        <TweakSection title="Mic icon style">
          <TweakRadio
            value={t.micStyle}
            onChange={v => setTweak('micStyle', v)}
            options={[
              {value:'classic', label:'Classic'},
              {value:'minimal', label:'Minimal'},
              {value:'wave', label:'Wave'},
            ]}
          />
        </TweakSection>
        <TweakSection title="Statusbar">
          <TweakToggle
            value={t.statusbar}
            onChange={v => setTweak('statusbar', v)}
            label="Show statusbar"
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

function OverlayStage({ theme, children }) {
  const bg = theme === 'dark'
    ? 'linear-gradient(135deg, #1a2030 0%, #0d1218 100%)'
    : 'linear-gradient(135deg, #e8edf4 0%, #f5f7fa 100%)';
  return (
    <div style={{
      width: '100%',
      height: '100%',
      background: bg,
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      borderRadius: 0,
    }}>
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
